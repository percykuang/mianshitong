services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP: web
    environment:
      NODE_ENV: production
      PORT: '3000'
      HOSTNAME: 0.0.0.0
    ports:
      - '3000:3000'

  admin:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP: admin
    environment:
      NODE_ENV: production
      PORT: '3000'
      HOSTNAME: 0.0.0.0
    ports:
      - '3001:3000'

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: mianshitong
      POSTGRES_USER: mianshitong
      POSTGRES_PASSWORD: mianshitong
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mianshitong -d mianshitong']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
