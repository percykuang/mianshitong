name: deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Compute image metadata
        id: vars
        env:
          REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
          REGISTRY_NAMESPACE: ${{ secrets.REGISTRY_NAMESPACE }}
        run: |
          registry_host="${REGISTRY_HOST:-ghcr.io}"
          if [[ "$registry_host" == "ghcr.io" ]]; then
            image_namespace="${REGISTRY_NAMESPACE:-${GITHUB_REPOSITORY_OWNER,,}}"
          else
            if [[ -z "${REGISTRY_NAMESPACE:-}" ]]; then
              echo "REGISTRY_NAMESPACE is required when REGISTRY_HOST is set." >&2
              exit 1
            fi
            image_namespace="$REGISTRY_NAMESPACE"
          fi

          echo "registry_host=${registry_host}" >> "$GITHUB_OUTPUT"
          echo "image_namespace=${image_namespace}" >> "$GITHUB_OUTPUT"
          echo "image_prefix=${registry_host}/${image_namespace}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to image registry
        env:
          REGISTRY_HOST: ${{ steps.vars.outputs.registry_host }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          GHCR_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "$REGISTRY_HOST" == "ghcr.io" ]]; then
            registry_username="${GITHUB_REPOSITORY_OWNER}"
            registry_password="$GHCR_PASSWORD"
          else
            registry_username="${REGISTRY_USERNAME:-}"
            registry_password="${REGISTRY_PASSWORD:-}"
            if [[ -z "$registry_username" || -z "$registry_password" ]]; then
              echo "REGISTRY_USERNAME and REGISTRY_PASSWORD are required for custom registry login." >&2
              exit 1
            fi
          fi

          printf '%s\n' "$registry_password" | docker login "$REGISTRY_HOST" -u "$registry_username" --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            APP=web
          push: true
          tags: |
            ${{ steps.vars.outputs.image_prefix }}/mianshitong-web:${{ steps.vars.outputs.image_tag }}
            ${{ steps.vars.outputs.image_prefix }}/mianshitong-web:main-latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Build and push admin image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            APP=admin
          push: true
          tags: |
            ${{ steps.vars.outputs.image_prefix }}/mianshitong-admin:${{ steps.vars.outputs.image_tag }}
            ${{ steps.vars.outputs.image_prefix }}/mianshitong-admin:main-latest
          cache-from: type=gha,scope=admin
          cache-to: type=gha,mode=max,scope=admin

      - name: Build and push migrate image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: migrator
          push: true
          tags: |
            ${{ steps.vars.outputs.image_prefix }}/mianshitong-migrate:${{ steps.vars.outputs.image_tag }}
            ${{ steps.vars.outputs.image_prefix }}/mianshitong-migrate:main-latest
          cache-from: type=gha,scope=migrate
          cache-to: type=gha,mode=max,scope=migrate

      - name: Configure SSH
        env:
          PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          PROD_SSH_KNOWN_HOSTS: ${{ secrets.PROD_SSH_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$PROD_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$PROD_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Login image registry on server
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
          REGISTRY_HOST: ${{ steps.vars.outputs.registry_host }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          GHCR_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "$REGISTRY_HOST" == "ghcr.io" ]]; then
            registry_username="${GITHUB_REPOSITORY_OWNER}"
            registry_password="$GHCR_PASSWORD"
          else
            registry_username="${REGISTRY_USERNAME:-}"
            registry_password="${REGISTRY_PASSWORD:-}"
            if [[ -z "$registry_username" || -z "$registry_password" ]]; then
              echo "REGISTRY_USERNAME and REGISTRY_PASSWORD are required for custom registry login." >&2
              exit 1
            fi
          fi

          printf '%s\n' "$registry_password" | ssh -p "$PROD_SSH_PORT" "$PROD_SSH_USER@$PROD_SSH_HOST" \
            "docker login '$REGISTRY_HOST' -u '$registry_username' --password-stdin"

      - name: Sync deploy files to server
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
          PROD_DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
        run: |
          ssh -p "$PROD_SSH_PORT" "$PROD_SSH_USER@$PROD_SSH_HOST" "mkdir -p '$PROD_DEPLOY_PATH/scripts'"
          scp -P "$PROD_SSH_PORT" deploy/compose.prod.yml deploy/Caddyfile "$PROD_SSH_USER@$PROD_SSH_HOST:$PROD_DEPLOY_PATH/"
          scp -P "$PROD_SSH_PORT" deploy/scripts/deploy.sh deploy/scripts/rollback.sh "$PROD_SSH_USER@$PROD_SSH_HOST:$PROD_DEPLOY_PATH/scripts/"

      - name: Trigger remote deploy
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
          PROD_DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}
        run: |
          ssh -p "$PROD_SSH_PORT" "$PROD_SSH_USER@$PROD_SSH_HOST" \
            "cd '$PROD_DEPLOY_PATH' && IMAGE_TAG='$IMAGE_TAG' bash scripts/deploy.sh"
