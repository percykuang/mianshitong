name: ci

on:
  workflow_dispatch:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm spellcheck

  admin-e2e:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 30
    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: mianshitong
          POSTGRES_PASSWORD: mianshitong
          POSTGRES_DB: mianshitong
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mianshitong -d mianshitong"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://mianshitong:mianshitong@127.0.0.1:5432/mianshitong?schema=public
      PLAYWRIGHT_SCOPE: admin
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm db:migrate:deploy
      - run: pnpm exec playwright install chromium --with-deps
      - run: pnpm test:e2e:admin
      - uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: admin-playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  web-e2e:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20
    env:
      PLAYWRIGHT_SCOPE: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm exec playwright install chromium --with-deps
      - run: pnpm test:e2e:web
      - uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: web-playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
